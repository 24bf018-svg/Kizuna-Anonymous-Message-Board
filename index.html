<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kizuna</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffeff8;
      color: #1f2937;
      min-height: 100vh;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 25px 12%;
    }

    .logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 26px;
  font-weight: bold;
  color: #1f2937;
}

.logo-img {
  width: 38px;
  height: 38px;
  object-fit: contain;
}

    nav a {
      text-decoration: none;
      margin-left: 20px;
      color: #1f2937;
      font-weight: bold;
      padding: 12px 20px;
      border-radius: 12px;
    }

    nav a:hover {
      background-color: #ffe4f1;
      color: #d63384;
    }

    .post-nav {
      background-color: #ec4899;
      color: white;
      border-radius: 30px;
    }

    .hero {
      text-align: center;
      padding: 120px 20px;
    }

    .small-label {
      display: inline-block;
      background-color: white;
      color: #d63384;
      padding: 10px 24px;
      border-radius: 30px;
      font-weight: bold;
      margin-bottom: 25px;
    }

    h1 {
      font-size: 64px;
      margin: 0 0 25px;
      color: #1f2937;
    }

    p {
      font-size: 24px;
      max-width: 700px;
      margin: 0 auto 40px;
      line-height: 1.5;
      color: #4b5563;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      padding: 18px 38px;
      border-radius: 35px;
      font-size: 20px;
      font-weight: bold;
    }

    .primary {
      background-color: #fa4aa2;
      color: white;
      box-shadow: 0 8px 18px rgba(236, 72, 153, 0.25);
    }

    .secondary {
      background-color: white;
      color: #1f2937;
    }

    .info {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 70px;
      flex-wrap: wrap;
    }

    .info-box {
      min-width: 160px;
      border-right: 1px solid #f3cfe0;
      padding: 0 25px;
    }

    .info-box:last-child {
      border-right: none;
    }

    .info-box strong {
      display: block;
      font-size: 28px;
    }

    .info-box span {
      display: block;
      font-size: 16px;
      margin-top: 8px;
      color: #6b7280;
    }

    @media (max-width: 700px) {
      header {
        padding: 20px;
        flex-direction: column;
        gap: 15px;
      }

      nav a {
        margin-left: 5px;
        padding: 10px 14px;
      }

      h1 {
        font-size: 42px;
      }

      p {
        font-size: 18px;
      }

      .hero {
        padding: 70px 20px;
      }

      .info {
        gap: 20px;
      }

      .info-box {
        border-right: none;
      }
    }
  </style>
</head>

<body>
  <header>
   <a href="index.html" class="logo">
  <img src="logo.png" class="logo-img" alt="Kizuna logo">
  <span>kizuna</span>
</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="posts.html">View Posts</a>
      <a href="post.html" class="post-nav">Post</a>
    </nav>
  </header>

  <main class="hero">
    <div class="small-label">you can share your feelings</div>

    <h1>Share your worries!!</h1>

    <p>
      Kizuna is a safe place where students can share their worries
      and support each other.
    </p>

    <div class="buttons">
      <a href="post.html" class="btn primary">Post Anonymously</a>
      <a href="posts.html" class="btn secondary">View Posts</a>
    </div>

    

  </main>
</body>
</html>
