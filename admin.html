<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kizuna Admin</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #fff7fb;
      color: #1f2937;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 25px 10%;
      border-bottom: 1px solid #f3d6e4;
      background-color: #fff7fb;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 26px;
      font-weight: bold;
      color: #1f2937;
      text-decoration: none;
    }

    .logo-img {
      width: 38px;
      height: 38px;
      object-fit: contain;
    }

    nav a {
      text-decoration: none;
      margin-left: 18px;
      color: #1f2937;
      font-weight: bold;
      padding: 10px 16px;
      border-radius: 14px;
    }

    nav a:hover {
      background-color: #ffe4f1;
      color: #be185d;
    }

    .admin-label {
      background-color: #dc2626;
      color: white;
      padding: 10px 18px;
      border-radius: 999px;
      font-weight: bold;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 45px 20px 80px;
    }

    h1 {
      font-size: 38px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 35px;
      font-size: 16px;
    }

    .section {
      margin-bottom: 45px;
    }

    .section h2 {
      font-size: 26px;
      margin-bottom: 18px;
    }

    .card {
      background-color: white;
      border: 1px solid #f0dce7;
      border-radius: 20px;
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-block;
      background-color: #ffe4f1;
      color: #be185d;
      padding: 6px 12px;
      border-radius: 999px;
      font-weight: bold;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .reason {
      font-weight: bold;
      color: #dc2626;
    }

    .small {
      color: #6b7280;
      font-size: 13px;
      line-height: 1.6;
      word-break: break-word;
    }

    .post-text {
      font-size: 16px;
      line-height: 1.7;
      margin: 12px 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .delete-btn {
      background-color: #dc2626;
      color: white;
    }

    .delete-btn:hover {
      background-color: #b91c1c;
    }

    .safe-btn {
      background-color: #f3f4f6;
      color: #374151;
    }

    .safe-btn:hover {
      background-color: #e5e7eb;
    }

    .empty {
      color: #9ca3af;
      background-color: white;
      border-radius: 18px;
      padding: 24px;
      border: 1px solid #f0dce7;
    }

    .message {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #1f2937;
      color: white;
      padding: 12px 20px;
      border-radius: 999px;
      display: none;
      z-index: 100;
    }

    .message.show {
      display: block;
    }

    .password-screen {
      position: fixed;
      inset: 0;
      background-color: #fff7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .password-box {
      background: white;
      padding: 32px;
      border-radius: 24px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      border: 1px solid #f0dce7;
    }

    .password-box h2 {
      margin-top: 0;
      font-size: 26px;
    }

    .password-box p {
      color: #6b7280;
      font-size: 14px;
    }

    .password-box input {
      width: 100%;
      padding: 14px;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      font-size: 18px;
      text-align: center;
      margin: 16px 0;
    }

    .password-box button {
      background-color: #ec4899;
      color: white;
      width: 100%;
      padding: 14px;
      border-radius: 999px;
    }

    .password-error {
      color: #dc2626;
      font-size: 14px;
      min-height: 20px;
      margin-top: 10px;
    }

    @media (max-width: 700px) {
      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
        padding: 20px;
      }

      nav a {
        margin-left: 0;
        margin-right: 8px;
      }

      .card-top {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="password-screen" id="passwordScreen">
    <div class="password-box">
      <h2>Admin Password</h2>
      <p>Please enter the 4-digit password.</p>

      <input
        type="password"
        id="adminPassword"
        maxlength="4"
        placeholder="Enter password"
      >

      <button id="passwordBtn">Enter</button>

      <div class="password-error" id="passwordError"></div>
    </div>
  </div>

  <header>
    <a href="index.html" class="logo">
      <img src="./logo.png" class="logo-img" alt="Kizuna logo">
      <span>kizuna</span>
    </a>

    <nav>
      <a href="index.html">Home</a>
      <a href="posts.html">View Posts</a>
      <a href="post.html">Post</a>
      <span class="admin-label">Admin</span>
    </nav>
  </header>

  <main>
    <h1>Admin Dashboard</h1>
    <p class="subtitle">
      Review reports and remove unsafe posts when needed.
    </p>

    <section class="section">
      <h2>Reported Items</h2>
      <div id="reportsList"></div>
    </section>

    <section class="section">
      <h2>All Posts</h2>
      <div id="postsList"></div>
    </section>
  </main>

  <div class="message" id="messageBox"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      onSnapshot,
      orderBy,
      query,
      doc,
      deleteDoc,
      updateDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA86h8lnn9d7fbKOgQ-oesOi7h2jliOVJc",
      authDomain: "kizuna-anonymouse-board.firebaseapp.com",
      projectId: "kizuna-anonymouse-board",
      storageBucket: "kizuna-anonymouse-board.firebasestorage.app",
      messagingSenderId: "422589461468",
      appId: "1:422589461468:web:1a60b3a3a06afe5b3d1519",
      measurementId: "G-LFRPHPGNP0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const reportsList = document.getElementById("reportsList");
    const postsList = document.getElementById("postsList");
    const messageBox = document.getElementById("messageBox");

    const correctPassword = "1234";

    const passwordScreen = document.getElementById("passwordScreen");
    const adminPassword = document.getElementById("adminPassword");
    const passwordBtn = document.getElementById("passwordBtn");
    const passwordError = document.getElementById("passwordError");

    passwordBtn.addEventListener("click", () => {
      if (adminPassword.value === correctPassword) {
        passwordScreen.style.display = "none";
      } else {
        passwordError.textContent = "Wrong password.";
        adminPassword.value = "";
      }
    });

    adminPassword.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        passwordBtn.click();
      }
    });

    let postsMap = {};

    function showMessage(text) {
      messageBox.textContent = text;
      messageBox.classList.add("show");

      setTimeout(() => {
        messageBox.classList.remove("show");
      }, 2500);
    }

    function formatDate(timestamp) {
      if (!timestamp) return "No date";

      let date;

      if (timestamp.toDate) {
        date = timestamp.toDate();
      } else {
        date = new Date(timestamp);
      }

      return date.toLocaleString("en-US", {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    async function deletePost(postId) {
      const ok = confirm("Are you sure you want to delete this post?");

      if (!ok) {
        return;
      }

      try {
        await deleteDoc(doc(db, "worries", postId));
        showMessage("Post deleted.");
      } catch (error) {
        console.error(error);
        showMessage("Failed to delete post.");
      }
    }

    async function markReportReviewed(reportId) {
      try {
        await updateDoc(doc(db, "reports", reportId), {
          status: "reviewed",
          reviewedAt: serverTimestamp()
        });

        showMessage("Report marked as reviewed.");
      } catch (error) {
        console.error(error);
        showMessage("Failed to update report.");
      }
    }

    function renderReports(reports) {
      reportsList.innerHTML = "";

      if (reports.length === 0) {
        reportsList.innerHTML = `<div class="empty">No reports yet.</div>`;
        return;
      }

      reports.forEach((report) => {
        const post = postsMap[report.postId];

        const card = document.createElement("div");
        card.className = "card";

        const postText = post ? post.text : "This post may have already been deleted.";

        card.innerHTML = `
          <div class="card-top">
            <div>
              <span class="badge">${report.targetType || "unknown"}</span>
              <div class="reason">${report.reason || "No reason"}</div>
            </div>
            <div class="small">${formatDate(report.timestamp)}</div>
          </div>

          <div class="small">
            Status: ${report.status || "new"}<br>
            Post ID: ${report.postId || "No post ID"}<br>
            Target ID: ${report.targetId || "No target ID"}
          </div>

          <p class="post-text"></p>

          <div class="small">
            Details: ${report.details || "No details"}
          </div>

          <div class="buttons">
            <button class="delete-btn">Delete Related Post</button>
            <button class="safe-btn">Mark Reviewed</button>
          </div>
        `;

        card.querySelector(".post-text").textContent = postText;

        const deleteBtn = card.querySelector(".delete-btn");
        const reviewedBtn = card.querySelector(".safe-btn");

        deleteBtn.addEventListener("click", () => {
          if (report.postId) {
            deletePost(report.postId);
          } else {
            showMessage("No post ID found.");
          }
        });

        reviewedBtn.addEventListener("click", () => {
          markReportReviewed(report.id);
        });

        reportsList.appendChild(card);
      });
    }

    function renderPosts(posts) {
      postsList.innerHTML = "";

      if (posts.length === 0) {
        postsList.innerHTML = `<div class="empty">No posts yet.</div>`;
        return;
      }

      posts.forEach((post) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="card-top">
            <div>
              <span class="badge">${post.category || "Uncategorized"}</span>
              <div class="small">Post ID: ${post.id}</div>
            </div>
            <div class="small">${formatDate(post.timestamp)}</div>
          </div>

          <p class="post-text"></p>

          <div class="small">
            I hear you: ${post.hearCount || 0}<br>
            Comments: ${post.commentCount || 0}
          </div>

          <div class="buttons">
            <button class="delete-btn">Delete Post</button>
          </div>
        `;

        card.querySelector(".post-text").textContent = post.text || "";

        const deleteBtn = card.querySelector(".delete-btn");

        deleteBtn.addEventListener("click", () => {
          deletePost(post.id);
        });

        postsList.appendChild(card);
      });
    }

    const postsQuery = query(collection(db, "worries"), orderBy("timestamp", "desc"));

    onSnapshot(postsQuery, (snapshot) => {
      const posts = [];
      postsMap = {};

      snapshot.forEach((docSnap) => {
        const post = {
          id: docSnap.id,
          ...docSnap.data()
        };

        posts.push(post);
        postsMap[post.id] = post;
      });

      renderPosts(posts);
    });

    const reportsQuery = query(collection(db, "reports"), orderBy("timestamp", "desc"));

    onSnapshot(reportsQuery, (snapshot) => {
      const reports = [];

      snapshot.forEach((docSnap) => {
        reports.push({
          id: docSnap.id,
          ...docSnap.data()
        });
      });

      renderReports(reports);
    });
  </script>
</body>
</html>
